services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-devpilot}
      POSTGRES_USER: ${POSTGRES_USER:-devpilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - devpilot_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-devpilot} -d ${POSTGRES_DB:-devpilot}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      APP_ENV: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_URL: postgresql://${POSTGRES_USER:-devpilot}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-devpilot}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET in .env}
      AUTH_SESSION_TTL_SECONDS: ${AUTH_SESSION_TTL_SECONDS:-2592000}
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-https://localhost}
      FRONTEND_ORIGIN_REGEX: ${FRONTEND_ORIGIN_REGEX:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      OPENAI_BASE_MODEL: ${OPENAI_BASE_MODEL:-gpt-5.4-mini}
      OPENAI_FINE_TUNED_MODEL: ${OPENAI_FINE_TUNED_MODEL:-}
      DEVPILOT_CUSTOM_MODEL: ${DEVPILOT_CUSTOM_MODEL:-}
      SLACK_WEBHOOK_URL: ${SLACK_WEBHOOK_URL:-}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOSITORY: ${GITHUB_REPOSITORY:-}
      GITHUB_BASE_BRANCH: ${GITHUB_BASE_BRANCH:-main}
      DEVPILOT_MAX_REQUEST_BODY_BYTES: ${DEVPILOT_MAX_REQUEST_BODY_BYTES:-1500000}
      DEVPILOT_RATE_LIMIT_WINDOW_SECONDS: ${DEVPILOT_RATE_LIMIT_WINDOW_SECONDS:-60}
      DEVPILOT_RATE_LIMIT_REQUESTS_PER_WINDOW: ${DEVPILOT_RATE_LIMIT_REQUESTS_PER_WINDOW:-120}
      AUTONOMOUS_AGENT_ENABLED: ${AUTONOMOUS_AGENT_ENABLED:-true}
      AUTONOMOUS_AGENT_INTERVAL_SECONDS: ${AUTONOMOUS_AGENT_INTERVAL_SECONDS:-15}
      AUTONOMOUS_AGENT_MODE: ${AUTONOMOUS_AGENT_MODE:-simulation}
      AUTONOMOUS_AGENT_APPLY_KUBERNETES: ${AUTONOMOUS_AGENT_APPLY_KUBERNETES:-false}
      AUTONOMOUS_AGENT_REQUIRE_APPROVAL: ${AUTONOMOUS_AGENT_REQUIRE_APPROVAL:-true}
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
        NEXT_PUBLIC_ENABLE_LIVE_K8S_TWIN: ${NEXT_PUBLIC_ENABLE_LIVE_K8S_TWIN:-false}
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro
      - ./nginx/certbot:/var/www/certbot:ro

volumes:
  devpilot_postgres_data:
